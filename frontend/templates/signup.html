{% extends "base.html" %}
{% block title %}Sign Up — Luxe Barber{% endblock %}
{% block content %}
<div class="auth-page">
  <div style="width:100%;max-width:28rem;">
    <div class="text-center mb-8">
      <h1 style="color:#fff;font-size:1.875rem;margin:0;">Create Account</h1>
      <p class="sub" style="color:var(--muted);">Register as a customer</p>
    </div>
    <div class="auth-card">
      <form method="post" action="/signup">
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input class="form-input" type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone (optional)</label>
          <input class="form-input" type="text" id="phone" name="phone" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
      <p class="text-center mt-4" style="color:var(--muted);font-size:0.875rem;">
        Already have an account? <a href="/login" style="color:var(--amber-light);font-weight:700;">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
